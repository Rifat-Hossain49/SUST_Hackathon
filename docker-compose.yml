# Convenience for local runs / judge Docker fallback.
#   docker compose up --build      ->  http://localhost:8000/health
services:
  api:
    build: .
    image: queuestorm-investigator:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # Optional Gemini polish. Leave off for the default rule-based service.
      - USE_LLM=false
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
      # - MODEL_NAME=gemini-3.5-flash
    restart: unless-stopped
