name: CI/CD DockerHub Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: rifathosain/queuestorm-investigator
  CONTAINER_NAME: qsi

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image=${IMAGE_NAME}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
      VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
      VM_APP_PORT: ${{ secrets.VM_APP_PORT }}
      USE_LLM: ${{ secrets.USE_LLM }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      LLM_TIMEOUT_SECONDS: ${{ secrets.LLM_TIMEOUT_SECONDS }}
      LLM_MAX_TOKENS: ${{ secrets.LLM_MAX_TOKENS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_check
        shell: bash
        run: |
          if [ -z "${VM_HOST}" ] || [ -z "${VM_USER}" ] || [ -z "${VM_SSH_PRIVATE_KEY}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping VM deploy because VM_HOST, VM_USER, or VM_SSH_PRIVATE_KEY is missing."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare runtime env file
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        run: |
          {
            echo "PORT=8000"
            echo "USE_LLM=${USE_LLM:-false}"
            echo "MODEL_NAME=${MODEL_NAME:-gemini-3.5-flash}"
            echo "LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-4.0}"
            echo "LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-600}"
            if [ -n "${GEMINI_API_KEY}" ]; then
              printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY"
            fi
          } > runtime.env

      - name: Install SSH key
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy deploy files to VM
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        run: |
          PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=accept-new"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" "mkdir -p ~/queuestorm-investigator"
          scp ${SSH_OPTS} scripts/deploy_vm.sh runtime.env "${VM_USER}@${VM_HOST}:~/queuestorm-investigator/"

      - name: Deploy container on VM
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        run: |
          PORT="${VM_SSH_PORT:-22}"
          APP_PORT="${VM_APP_PORT:-8011}"
          SSH_OPTS="-i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=accept-new"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" \
            "chmod +x ~/queuestorm-investigator/deploy_vm.sh && ~/queuestorm-investigator/deploy_vm.sh '${IMAGE}' '${CONTAINER_NAME}' '${APP_PORT}'"
